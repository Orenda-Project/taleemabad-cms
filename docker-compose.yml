version: '3.8'

services:
  cms:
    build: .
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
      - VITE_API_KEY=${VITE_API_KEY:-your-api-key-here}
      - VITE_FDE_STAGE_URL=${VITE_FDE_STAGE_URL:-https://fde-staging.taleemabad.com}
      - VITE_FDE_PROD_URL=${VITE_FDE_PROD_URL:-https://fde-staging.taleemabad.com}
      - VITE_RWL_STAGE_URL=${VITE_RWL_STAGE_URL:-https://fde-staging.taleemabad.com}
      - VITE_RWL_PROD_URL=${VITE_RWL_PROD_URL:-https://rawalpindi.niete.pk}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
